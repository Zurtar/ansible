---
- name: Ensure home directory is owned by target user
  ansible.builtin.file:
    path: "{{ target_home }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    recurse: true

- name: Create user directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  loop:
    - "{{ target_home }}/.local/bin"
    - "{{ target_home }}/repos"
    - "{{ target_home }}/notes"

- name: Harden sshd config
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PermitRootLogin no
      X11Forwarding no
      PasswordAuthentication yes
  notify: Restart sshd

- name: Deploy authorized keys
  ansible.posix.authorized_key:
    user: "{{ target_user }}"
    key: "{{ lookup('file', playbook_dir + '/meta/authorized-keys') }}"
    exclusive: false
    state: present
