---
- name: Create user directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  loop:
    - "{{ target_home }}/.local/bin"
    - "{{ target_home }}/repos"
    - "{{ target_home }}/notes"

- name: Deploy authorized keys
  ansible.posix.authorized_key:
    user: "{{ target_user }}"
    key: "{{ lookup('file', playbook_dir + '/meta/authorized-keys') }}"
    exclusive: true
    state: present
