---
- name: Read package list
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/meta/install-list/apt"
  register: _apt_list_raw

- name: Install packages
  ansible.builtin.apt:
    name: >-
      {{
        (_apt_list_raw.content | b64decode).splitlines()
        | reject('match', '^\\s*(#.*)?$')
        | list
      }}
    state: present

- name: Symlink batcat to bat
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: "{{ target_home }}/.local/bin/bat"
    state: link
    owner: "{{ target_user }}"
