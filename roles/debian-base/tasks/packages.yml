---
- name: Install packages
  ansible.builtin.apt:
    name: >-
      {{
        lookup('file', playbook_dir + '/meta/install-list/apt').splitlines()
        | reject('match', '^\\s*(#.*)?$')
        | list
      }}
    state: present

- name: Symlink batcat to bat
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: "{{ target_home }}/.local/bin/bat"
    state: link
    owner: "{{ target_user }}"
