---
- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    version: main
    update: true
  become: true
  become_user: "{{ target_user }}"

- name: Find all files in dotfiles files/ tree
  ansible.builtin.find:
    paths: "{{ dotfiles_dest }}/files"
    recurse: true
    file_type: file
    hidden: true
    excludes:
      - ".viminfo"  # runtime-generated by vim, not meant to be shared
  register: _dotfiles

- name: Ensure parent directories exist for nested dotfiles
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item.path | relpath(dotfiles_dest + '/files') | dirname }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  loop: "{{ _dotfiles.files }}"
  when: item.path | relpath(dotfiles_dest + '/files') | dirname != ''

- name: Symlink dotfiles into home directory
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ target_home }}/{{ item.path | relpath(dotfiles_dest + '/files') }}"
    state: link
    owner: "{{ target_user }}"
  loop: "{{ _dotfiles.files }}"

- name: Clone TPM (tmux plugin manager)
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ target_home }}/.tmux/plugins/tpm"
    version: master
    update: true
  become: true
  become_user: "{{ target_user }}"

- name: Install bash-tips fortune files
  ansible.builtin.copy:
    src: "{{ dotfiles_dest }}/data/{{ item }}"
    dest: "/usr/share/games/fortunes/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - bash-tips
    - bash-tips.dat
