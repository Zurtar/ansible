---
- name: Ensure ~/.ssh has correct permissions
  ansible.builtin.file:
    path: "{{ target_home }}/.ssh"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"

- name: Fix dotfiles repo ownership if cloned as wrong user
  ansible.builtin.file:
    path: "{{ dotfiles_dest }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    recurse: true
  when: dotfiles_dest is directory

- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    version: main
    update: true
  become: true
  become_user: "{{ target_user }}"
  environment:
    GIT_SSH_COMMAND: "ssh -i {{ target_home }}/.ssh/id_ed25519_github -o StrictHostKeyChecking=accept-new"

- name: Find all files in dotfiles files/ tree
  ansible.builtin.find:
    paths: "{{ dotfiles_dest }}/files"
    recurse: true
    file_type: file
    hidden: true
    excludes:
      - ".viminfo"
  register: _dotfiles
  become: true
  become_user: "{{ target_user }}"

- name: Ensure parent directories exist for nested dotfiles
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item.path | relpath(dotfiles_dest + '/files') | dirname }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  loop: "{{ _dotfiles.files }}"
  loop_control:
    label: "{{ item.path | relpath(dotfiles_dest + '/files') | dirname }}"
  when: item.path | relpath(dotfiles_dest + '/files') | dirname != ''

- name: Symlink dotfiles into home directory
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ target_home }}/{{ item.path | relpath(dotfiles_dest + '/files') }}"
    state: link
    owner: "{{ target_user }}"
    force: true
  loop: "{{ _dotfiles.files }}"
  loop_control:
    label: "{{ item.path | relpath(dotfiles_dest + '/files') }}"

- name: Clone TPM (tmux plugin manager)
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ target_home }}/.tmux/plugins/tpm"
    version: master
    update: true
  become: true
  become_user: "{{ target_user }}"

- name: Install bash-tips fortune files
  ansible.builtin.copy:
    src: "{{ dotfiles_dest }}/data/{{ item }}"
    dest: "/usr/share/games/fortunes/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - bash-tips
    - bash-tips.dat
  ignore_errors: true
